<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula PIP - Control de Asistencia</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary: #4CAF50;
      --primary-dark: #45a049;
      --secondary: #2196F3;
      --secondary-dark: #1976D2;
      --success: #d4edda;
      --success-text: #155724;
      --error: #f8d7da;
      --error-text: #721c24;
      --warning: #fff3cd;
      --warning-text: #856404;
      --bg-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --shadow: 0 4px 20px rgba(0,0,0,0.15);
      --border-radius: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      min-height: 100vh;
      padding: 10px;
      line-height: 1.5;
    }

    .container {
      max-width: min(500px, 100vw - 20px);
      margin: 0 auto;
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: var(--primary);
      color: white;
      padding: clamp(15px, 4vw, 25px);
      text-align: center;
    }

    .header h1 {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header p {
      font-size: clamp(12px, 3vw, 14px);
      opacity: 0.9;
    }

    .content {
      padding: clamp(15px, 5vw, 30px);
    }

    .time-display {
      background: linear-gradient(45deg, #e8f5e8, #f0fff0);
      border: 2px solid var(--primary);
      border-radius: var(--border-radius);
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 600;
      color: #2e7d32;
    }

    .camera-toggle {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: var(--border-radius);
      padding: 15px;
      margin-bottom: 15px;
      text-align: center;
    }

    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: var(--transition);
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: var(--transition);
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--primary);
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .camera-controls {
      display: none;
      margin-bottom: 15px;
    }

    .camera-select select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: var(--border-radius);
      font-size: 14px;
      background: white;
    }

    #reader {
      width: 100%;
      max-width: min(300px, 90vw);
      margin: 0 auto 20px;
      border: 2px dashed #ddd;
      border-radius: var(--border-radius);
      overflow: hidden;
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: clamp(14px, 3.5vw, 16px);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: clamp(10px, 3vw, 14px);
      border: 2px solid #ddd;
      border-radius: var(--border-radius);
      font-size: clamp(14px, 4vw, 16px);
      transition: var(--transition);
      background: white;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .btn {
      width: 100%;
      padding: clamp(12px, 3vw, 16px);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: clamp(14px, 4vw, 16px);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--secondary);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--secondary-dark);
    }

    .btn-logout {
      background: #dc3545;
      margin-top: 10px;
    }

    .btn-logout:hover:not(:disabled) {
      background: #c82333;
    }

    .employee-info {
      background: linear-gradient(45deg, #f8f9fa, #ffffff);
      border: 2px solid var(--primary);
      border-radius: var(--border-radius);
      padding: 15px;
      margin-bottom: 20px;
      display: none;
      box-shadow: 0 2px 10px rgba(76, 175, 80, 0.1);
    }

    .employee-info h3 {
      color: var(--primary);
      margin-bottom: 10px;
      font-size: clamp(16px, 4vw, 18px);
    }

    .employee-info p {
      margin: 5px 0;
      color: #6c757d;
      font-size: clamp(13px, 3vw, 14px);
    }

    .employee-info .highlight {
      font-weight: 600;
      color: #495057;
    }

    #respuesta {
      margin-top: 20px;
      padding: 15px;
      border-radius: var(--border-radius);
      text-align: center;
      font-weight: 600;
      display: none;
      font-size: clamp(13px, 3.5vw, 15px);
    }

    .success {
      background: var(--success);
      color: var(--success-text);
      border: 1px solid #c3e6cb;
    }

    .error {
      background: var(--error);
      color: var(--error-text);
      border: 1px solid #f5c6cb;
    }

    .warning {
      background: var(--warning);
      color: var(--warning-text);
      border: 1px solid #ffeaa7;
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .qr-status {
      text-align: center;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: var(--border-radius);
      background: #e3f2fd;
      color: #1565c0;
      display: none;
      font-size: clamp(12px, 3vw, 14px);
    }

    .admin-panel {
      margin-top: 20px;
      border: 2px dashed #cbd5e1;
      border-radius: var(--border-radius);
      padding: 12px;
      background: #f8fafc;
    }

    .admin-panel h4 {
      font-size: clamp(14px, 4vw, 16px);
      margin-bottom: 10px;
      color: #1f2937;
    }

    .admin-status {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border-radius: var(--border-radius);
      font-size: clamp(12px, 3vw, 14px);
      text-align: center;
    }

    /* Estilos para el Login */
    #login-overlay {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: slideIn 0.5s ease-out;
    }

    .login-box h2 {
      color: #4CAF50;
      margin-bottom: 20px;
      text-align: center;
      font-size: 24px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: var(--transition);
    }

    .login-box input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: var(--transition);
    }

    .login-box button:hover {
      background: #45a049;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .login-error {
      color: #dc3545;
      margin-top: 15px;
      text-align: center;
      display: none;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      body {
        padding: 5px;
      }
      
      .content {
        padding: 15px;
      }
      
      .toggle-wrapper {
        justify-content: center;
      }
    }

    @media (min-width: 768px) {
      .container {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- PANTALLA DE LOGIN -->
  <div id="login-overlay">
    <div class="login-box">
      <h2>🔐 Aula PIP</h2>
      <input type="text" id="login-user" placeholder="Usuario" autocomplete="off">
      <input type="password" id="login-pass" placeholder="Contraseña">
      <button onclick="verificarLogin()">Ingresar</button>
      <p id="login-error" class="login-error">Usuario o contraseña incorrectos</p>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL (protegido por login) -->
  <div class="container" id="main-content" style="display: none;">
    <div class="header">
      <h1>Aula PIP</h1>
      <p>Escanea tu código QR o ingresa tu ID</p>
    </div>
    
    <div class="content">
      <div class="time-display" id="reloj-tiempo">Cargando...</div>
      
      <div class="camera-toggle">
        <div class="toggle-wrapper">
          <span>Cámara:</span>
          <label class="switch">
            <input type="checkbox" id="camera-toggle" checked>
            <span class="slider"></span>
          </label>
          <span id="camera-status">Activada</span>
        </div>
      </div>
      
      <div class="qr-status" id="qr-status">Iniciando cámara...</div>
      
      <div class="camera-controls" id="camera-controls">
        <div class="camera-select">
          <select id="camera-select">
            <option value="">Seleccione una cámara...</option>
          </select>
        </div>
      </div>
      
      <div id="reader"></div>
      
      <button type="button" class="btn btn-secondary" id="reiniciar-btn" onclick="reiniciarQR()" style="display: none;">
        Reiniciar Escáner
      </button>
      
      <form id="formulario">
        <div class="form-group">
          <label for="id">ID del Estudiante:</label>
          <input type="text" id="id" required placeholder="Ingrese su ID">
        </div>
        
        <div class="employee-info" id="employee-info">
          <h3>Información del Estudiante</h3>
          <p><strong>Nombre:</strong> <span id="employee-name" class="highlight">-</span></p>
          <p><strong>Grado/Sección:</strong> <span id="employee-area" class="highlight">-</span></p>
          <p><strong>Perfil:</strong> <span id="employee-position" class="highlight">-</span></p>
        </div>
        
        <div class="form-group">
          <label for="estado">Estado:</label>
          <select id="estado" required>
            <option value="INGRESO">INGRESO</option>
            <option value="SALIDA">SALIDA</option>
          </select>
        </div>
        
        <button type="submit" class="btn" id="btn-submit" disabled>
          Registrar Asistencia
        </button>
      </form>
      
      <div id="respuesta"></div>

      <div class="admin-panel">
        <button type="button" class="btn btn-secondary" id="admin-toggle">Panel Administrador</button>
        <div id="admin-body" style="display: none;">
          <h4>Generar Carnets</h4>
          <div class="form-group">
            <label for="admin-id">ID del Estudiante:</label>
            <input type="text" id="admin-id" placeholder="Ingrese ID">
          </div>
          <button type="button" class="btn" id="admin-generar-id">Generar carnet PDF</button>
          <div class="form-group">
            <label for="admin-grado">Grado/Sección:</label>
            <select id="admin-grado">
              <option value="">Seleccione...</option>
            </select>
          </div>
          <button type="button" class="btn" id="admin-generar-lote">Generar lote PDF</button>
          <div id="admin-status" class="admin-status"></div>
        </div>
      </div>

      <!-- Botón de Cerrar Sesión -->
      <button type="button" class="btn btn-logout" onclick="cerrarSesion()">
        Cerrar Sesión
      </button>
    </div>
  </div>

  <script>
    // ============================================
    // CONFIGURACIÓN - ¡CAMBIA ESTOS VALORES!
    // ============================================
    const CONFIG = {
      // URL de tu Apps Script (CAMBIA ESTO por la URL que obtienes al publicar)
      APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxxNz9FhBV3ybKs8CMow5mc1PusG2AybD6_POwWvsUR813pNC60OFS_VDzbpzGs24k/exec',
      
      // Credenciales de login (cámbialas por las que quieras)
      USUARIO: 'admin',
      CONTRASEÑA: 'pip2026',
    };

    // ============================================
    // SISTEMA DE LOGIN
    // ============================================
    function verificarLogin() {
      const user = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;
      
      if (user === CONFIG.USUARIO && pass === CONFIG.CONTRASEÑA) {
        localStorage.setItem('auth_pip', 'true');
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        iniciarAplicacion();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function cerrarSesion() {
      localStorage.removeItem('auth_pip');
      location.reload();
    }

    // ============================================
    // COMUNICACIÓN CON APPS SCRIPT
    // ============================================
    async function llamarAppsScript(funcion, parametros = {}) {
      try {
        // Mostrar estado de carga
        console.log('Llamando a Apps Script:', funcion, parametros);
        
        // Construir URL con los parámetros
        const url = new URL(CONFIG.APPS_SCRIPT_URL);
        url.searchParams.append('funcion', funcion);
        url.searchParams.append('datos', JSON.stringify(parametros));
        
        // Hacer la petición
        const respuesta = await fetch(url.toString(), {
          method: 'GET',
          mode: 'cors',
        });
        
        const texto = await respuesta.text();
        console.log('Respuesta de Apps Script:', texto);
        
        try {
          return JSON.parse(texto);
        } catch (e) {
          console.error('Error parseando JSON:', e);
          return { error: true, mensaje: 'Respuesta no válida del servidor' };
        }
      } catch (error) {
        console.error('Error en llamarAppsScript:', error);
        return { error: true, mensaje: error.message };
      }
    }

    // ============================================
    // VARIABLES GLOBALES
    // ============================================
    let qrCodeReader = null;
    let isScanning = false;
    let searchTimeout = null;
    let studentData = null;
    let selectedCameraId = null;
    let cameraEnabled = true;

    // ============================================
    // FUNCIONES DE TIEMPO
    // ============================================
    function actualizarReloj() {
      const ahora = new Date();
      const hora = ahora.toLocaleTimeString('es-PE', {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
      const fecha = ahora.toLocaleDateString('es-PE', {
        weekday: 'short', day: 'numeric', month: 'short'
      });
      
      document.getElementById('reloj-tiempo').innerHTML = `${hora}<br><small>${fecha}</small>`;
    }

    // ============================================
    // FUNCIONES DE CÁMARA Y QR
    // ============================================
    function esMobile() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }
    
    function actualizarEstadoQR(mensaje, esError = false) {
      const statusEl = document.getElementById('qr-status');
      statusEl.textContent = mensaje;
      statusEl.style.background = esError ? '#ffebee' : '#e3f2fd';
      statusEl.style.color = esError ? '#c62828' : '#1565c0';
      statusEl.style.display = 'block';
    }
    
    function toggleCamera(enabled) {
      cameraEnabled = enabled;
      const statusSpan = document.getElementById('camera-status');
      
      if (enabled) {
        statusSpan.textContent = 'Activada';
        statusSpan.style.color = 'var(--primary)';
        document.getElementById('reader').style.display = 'block';
        document.getElementById('qr-status').style.display = 'block';
        document.getElementById('reiniciar-btn').style.display = 'block';
        cargarCamaras();
      } else {
        statusSpan.textContent = 'Desactivada';
        statusSpan.style.color = '#999';
        detenerEscaneo();
        document.getElementById('reader').style.display = 'none';
        document.getElementById('qr-status').style.display = 'none';
        document.getElementById('reiniciar-btn').style.display = 'none';
        document.getElementById('camera-controls').style.display = 'none';
      }
    }
    
    function detenerEscaneo() {
      if (qrCodeReader && isScanning) {
        qrCodeReader.stop().then(() => {
          qrCodeReader = null;
          isScanning = false;
        }).catch(err => console.error('Error stopping scanner:', err));
      }
    }
    
    function cargarCamaras() {
      if (!cameraEnabled) return;
      
      Html5Qrcode.getCameras()
        .then(devices => {
          if (devices.length > 0) {
            if (esMobile() && devices.length > 1) {
              mostrarSelectorCamara(devices);
            } else {
              selectedCameraId = devices.find(d => 
                d.label.toLowerCase().includes('back') || 
                d.label.toLowerCase().includes('rear')
              )?.id || devices[0].id;
              iniciarEscaneo();
            }
          }
        })
        .catch(err => {
          console.error("Error getting cameras:", err);
          actualizarEstadoQR("Error al detectar cámaras", true);
        });
    }
    
    function mostrarSelectorCamara(devices) {
      const controlsDiv = document.getElementById('camera-controls');
      const select = document.getElementById('camera-select');
      
      select.innerHTML = '<option value="">Seleccione una cámara...</option>';
      
      devices.forEach((device, index) => {
        const option = document.createElement('option');
        option.value = device.id;
        
        let tipo = 'Cámara ' + (index + 1);
        if (device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('rear')) {
          tipo = 'Cámara Trasera';
        } else if (device.label.toLowerCase().includes('front') || device.label.toLowerCase().includes('user')) {
          tipo = 'Cámara Frontal';
        }
        
        option.textContent = tipo;
        select.appendChild(option);
      });
      
      controlsDiv.style.display = 'block';
      
      select.addEventListener('change', function() {
        if (this.value) {
          selectedCameraId = this.value;
          if (isScanning) {
            reiniciarQR();
          } else {
            iniciarEscaneo();
          }
        }
      });
      
      // Seleccionar cámara trasera por defecto
      const rearCamera = devices.find(d => 
        d.label.toLowerCase().includes('back') || 
        d.label.toLowerCase().includes('rear')
      );
      if (rearCamera) {
        select.value = rearCamera.id;
        selectedCameraId = rearCamera.id;
        iniciarEscaneo();
      }
    }
    
    function iniciarEscaneo() {
      if (isScanning || !selectedCameraId || !cameraEnabled) return;
      
      const readerId = "reader";
      if (document.getElementById(readerId).children.length > 0) {
        document.getElementById(readerId).innerHTML = '';
      }
      
      qrCodeReader = new Html5Qrcode(readerId);
      
      actualizarEstadoQR("Iniciando cámara...");
      
      const config = { 
        fps: 10, 
        qrbox: { 
          width: Math.min(250, window.innerWidth * 0.7), 
          height: Math.min(250, window.innerWidth * 0.7) 
        }, 
        aspectRatio: 1.0 
      };
      
      qrCodeReader.start(
        selectedCameraId,
        config,
        (decodedText) => {
          actualizarEstadoQR("QR detectado correctamente");
          procesarQR(decodedText);
        },
        () => {}
      ).then(() => {
        isScanning = true;
        actualizarEstadoQR("Escaneando... Acerca el código QR");
      }).catch(err => {
        actualizarEstadoQR("Error al acceder a la cámara", true);
        console.error("Error starting QR scanner:", err);
      });
    }
    
    function reiniciarQR() {
      detenerEscaneo();
      
      if (selectedCameraId && cameraEnabled) {
        setTimeout(iniciarEscaneo, 500);
      } else if (cameraEnabled) {
        setTimeout(cargarCamaras, 500);
      }
    }
    
    function procesarQR(textoQR) {
      const idEstudiante = textoQR.trim();
      document.getElementById("id").value = idEstudiante;
      buscarEstudiante(idEstudiante);
      mostrarRespuesta("ID cargado desde QR", "success");
    }
    
    // ============================================
    // FUNCIONES DE BÚSQUEDA Y REGISTRO
    // ============================================
    async function buscarEstudiante(id) {
      if (!id.trim()) {
        ocultarInfoEstudiante();
        return;
      }
      
      mostrarBusqueda();
      
      // Llamar a Apps Script
      const resultado = await llamarAppsScript('buscarEstudiante', { id: id });
      
      if (resultado && resultado.encontrado) {
        studentData = resultado.datos;
        mostrarInfoEstudiante(resultado.datos);
        habilitarBotonRegistro();
      } else {
        ocultarInfoEstudiante();
        mostrarRespuesta(resultado?.mensaje || 'Estudiante no encontrado', 'warning');
        deshabilitarBotonRegistro();
      }
    }
    
    function mostrarBusqueda() {
      const infoDiv = document.getElementById('employee-info');
      infoDiv.style.display = 'block';
      document.getElementById('employee-name').innerHTML = '<div class="loading"></div> Buscando...';
    }
    
    function mostrarInfoEstudiante(datos) {
      const infoDiv = document.getElementById('employee-info');
      infoDiv.style.display = 'block';
      document.getElementById('employee-name').textContent = datos.nombre || '-';
      document.getElementById('employee-area').textContent = datos.area || '-';
      document.getElementById('employee-position').textContent = datos.cargo || '-';
    }
    
    function ocultarInfoEstudiante() {
      document.getElementById('employee-info').style.display = 'none';
      studentData = null;
    }
    
    function habilitarBotonRegistro() {
      document.getElementById('btn-submit').disabled = false;
    }
    
    function deshabilitarBotonRegistro() {
      document.getElementById('btn-submit').disabled = true;
    }
    
    function mostrarRespuesta(mensaje, tipo) {
      const respuesta = document.getElementById("respuesta");
      respuesta.textContent = mensaje;
      respuesta.className = tipo;
      respuesta.style.display = "block";
      
      if (tipo === "success") {
        setTimeout(() => {
          respuesta.style.display = "none";
        }, 5000);
      }
    }

    function mostrarAdminEstado(mensaje, esError) {
      const status = document.getElementById('admin-status');
      status.textContent = mensaje;
      status.style.display = 'block';
      status.style.background = esError ? '#fee2e2' : '#dcfce7';
      status.style.color = esError ? '#b91c1c' : '#166534';
    }

    function descargarArchivo(base64, filename, mimeType) {
      const enlace = document.createElement('a');
      enlace.href = 'data:' + mimeType + ';base64,' + base64;
      enlace.download = filename;
      document.body.appendChild(enlace);
      enlace.click();
      document.body.removeChild(enlace);
    }

    async function cargarGradosSecciones() {
      const resultado = await llamarAppsScript('listarGrados');
      const select = document.getElementById('admin-grado');
      
      if (resultado && resultado.grados) {
        select.innerHTML = '<option value="">Seleccione...</option>';
        resultado.grados.forEach(g => {
          const option = document.createElement('option');
          option.value = g;
          option.textContent = g;
          select.appendChild(option);
        });
      }
    }
    
    async function enviarFormulario(event) {
      event.preventDefault();
      
      const id = document.getElementById("id").value.trim();
      const estado = document.getElementById("estado").value;
      
      if (!id || !studentData) {
        mostrarRespuesta("Por favor ingrese un ID válido", "error");
        return;
      }
      
      const btnSubmit = document.getElementById("btn-submit");
      btnSubmit.innerHTML = '<div class="loading"></div> Registrando...';
      btnSubmit.disabled = true;
      
      const data = { 
        id: id,
        nombre: studentData.nombre,
        area: studentData.area,
        cargo: studentData.cargo,
        telefono: studentData.telefono || '',
        estado: estado 
      };
      
      const resultado = await llamarAppsScript('registrarAsistencia', data);
      
      btnSubmit.innerHTML = 'Registrar Asistencia';
      
      if (resultado && resultado.exito) {
        mostrarRespuesta(resultado.mensaje, "success");
        document.getElementById("formulario").reset();
        document.getElementById("estado").value = "INGRESO";
        ocultarInfoEstudiante();
        deshabilitarBotonRegistro();
        habilitarBotonRegistro();
      } else {
        mostrarRespuesta(resultado?.mensaje || 'Error al registrar', "error");
        habilitarBotonRegistro();
      }
    }
    
    function iniciarAplicacion() {
      // Configurar event listeners
      document.getElementById("formulario").addEventListener("submit", enviarFormulario);
      
      document.getElementById("id").addEventListener("input", function(e) {
        const id = e.target.value.trim();
        
        if (searchTimeout) clearTimeout(searchTimeout);
        
        if (id.length > 0) {
          ocultarInfoEstudiante();
          deshabilitarBotonRegistro();
          searchTimeout = setTimeout(() => buscarEstudiante(id), 1000);
        }
      });
      
      document.getElementById("camera-toggle").addEventListener("change", function(e) {
        toggleCamera(e.target.checked);
      });

      document.getElementById('admin-toggle').addEventListener('click', function() {
        const body = document.getElementById('admin-body');
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
      });

      document.getElementById('admin-generar-id').addEventListener('click', async function() {
        const id = document.getElementById('admin-id').value.trim();
        if (!id) {
          mostrarAdminEstado('Ingrese un ID válido', true);
          return;
        }
        mostrarAdminEstado('Generando PDF...', false);
        const resultado = await llamarAppsScript('generarCarnet', { id: id });
        if (resultado && resultado.ok) {
          mostrarAdminEstado('PDF generado correctamente', false);
        } else {
          mostrarAdminEstado(resultado?.mensaje || 'Error al generar PDF', true);
        }
      });

      document.getElementById('admin-generar-lote').addEventListener('click', async function() {
        const grado = document.getElementById('admin-grado').value;
        if (!grado) {
          mostrarAdminEstado('Seleccione un grado/sección', true);
          return;
        }
        mostrarAdminEstado('Generando lote...', false);
        const resultado = await llamarAppsScript('generarLote', { grado: grado });
        if (resultado && resultado.ok) {
          mostrarAdminEstado('Lote generado correctamente', false);
        } else {
          mostrarAdminEstado(resultado?.mensaje || 'Error al generar lote', true);
        }
      });

      // Iniciar reloj
      setInterval(actualizarReloj, 1000);
      actualizarReloj();
      
      // Cargar grados
      cargarGradosSecciones();
      
      // Iniciar cámara después de un momento
      setTimeout(() => {
        if (cameraEnabled) {
          cargarCamaras();
        }
      }, 1000);
    }

    // ============================================
    // INICIALIZACIÓN
    // ============================================
    window.addEventListener('load', function() {
      // Verificar si ya está autenticado
      if (localStorage.getItem('auth_pip') === 'true') {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        iniciarAplicacion();
      }
    });
    
    window.addEventListener('beforeunload', function() {
      detenerEscaneo();
    });
    
    window.addEventListener('resize', function() {
      if (isScanning) {
        reiniciarQR();
      }
    });
  </script>
</body>
</html>
